<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, push, remove, update } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyASHy-ZNSEy6W64vF6-UW-YwYJUAEjM1JE",
  authDomain: "koya-shop-3fdb0.firebaseapp.com",
  databaseURL: "https://koya-shop-3fdb0-default-rtdb.firebaseio.com",
  projectId: "koya-shop-3fdb0",
  storageBucket: "koya-shop-3fdb0.firebasestorage.app",
  messagingSenderId: "273272012315",
  appId: "1:273272012315:web:4b0b71b9a94bc00cb2c2be",
  measurementId: "G-JH4PJNV752"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const productsRef = ref(db, 'products');

// ========================
// PRODUCTS DATA
// ========================
const defaultProducts = {
  nitro: { id:'nitro', icon:'🚀', name:'Discord Nitro', desc:'Le Nitro complet — tout ce que Discord a à offrir, avec 2 boosts et 30% de réduction sur les boosts supplémentaires.', color:'blurple', badgeClass:'badge-blurple', badgeLabel:'Nitro Complet', features:['Emojis & autocollants personnalisés animés','Icônes d\'application personnalisées','Super réactions','Upload jusqu\'à 500 Mo','Streaming jusqu\'en 4K et 60 fps','2 boosts + 30% réduction boosts supp.','Avatar animé, bannière et thème de profil','Styles de nom d\'affichage','Profils par serveur personnalisés','Couleurs pour ton thème Discord','Badge Nitro sur ton profil','Arrière-plans vidéo personnalisés','Sons personnalisés partout + sons d\'entrée','Rejoins jusqu\'à 200 serveurs','Messages jusqu\'à 4000 caractères','3 passes d\'ami Nitro'], price:5.99, period:'1 mois', available:true, popular:true },
  basic: { id:'basic', icon:'🎮', name:'Discord Nitro Basic', desc:'L\'essentiel Discord à petit prix : emojis animés, stickers, badge et plus encore.', color:'blurple', badgeClass:'badge-blurple', badgeLabel:'Nitro Basic', features:['Emojis personnalisés animés partout','Autocollants personnalisés','Icônes d\'application personnalisées','Super réactions','Upload fichiers jusqu\'à 50 Mo','Badge Nitro sur ton profil','Arrière-plans vidéo personnalisés'], price:1.99, period:'1 mois', available:true, popular:false },
  boost14: { id:'boost14', icon:'👑', name:'14 Server Boosts', desc:'Propulse ton serveur au niveau 3 instantanément avec tous les avantages premium.', color:'pink', badgeClass:'badge-pink', badgeLabel:'Méga Pack', features:['Niveau 3 instantané','250 emojis personnalisés','Upload serveur 100 Mo','Qualité audio 384 kbps','Bannière de serveur animée','Sticker slots supplémentaires'], price:8.00, period:'14 boosts · 1 mois', available:true, popular:false },
  spotify: { id:'spotify', icon:'🎵', name:'Spotify Premium Lifetime', desc:'Profite de Spotify Premium sans publicité, pour toujours. Musique illimitée à vie.', color:'spotify', badgeClass:'badge-spotify', badgeLabel:'Lifetime', features:['Zéro publicité','Écoute hors ligne illimitée','Qualité audio maximale','Accès illimité à tout le catalogue','Valable à vie'], price:6.99, period:'à vie', available:true, popular:false },
  nitro3: { id:'nitro3', icon:'⭐', name:'Discord Nitro 3 mois', desc:'Nitro complet pour 3 mois.', color:'gold', badgeClass:'badge-gold', badgeLabel:'Promo', features:['Tout le contenu Nitro complet','2 boosts inclus','3 mois sans interruption'], price:17.99, period:'3 mois', available:false, popular:false },
  nitro12: { id:'nitro12', icon:'💎', name:'Discord Nitro 12 mois', desc:'Nitro complet pour toute l\'année.', color:'gold', badgeClass:'badge-gold', badgeLabel:'Annuel', features:['Tout le contenu Nitro complet','2 boosts inclus','12 mois sans interruption'], price:59.99, period:'12 mois', available:false, popular:false },
  boost1: { id:'boost1', icon:'✨', name:'1 Server Boost', desc:'Un boost serveur pour 1 mois.', color:'pink', badgeClass:'badge-pink', badgeLabel:'Boost', features:['+1 niveau de boost','Emoji custom supplémentaire'], price:3.49, period:'1 mois', available:false, popular:false },
  boost5: { id:'boost5', icon:'🔥', name:'5 Server Boosts', desc:'Pack 5 boosts pour atteindre le niveau 2.', color:'pink', badgeClass:'badge-pink', badgeLabel:'Pack Boost', features:['Niveau 2 accessible','100 emojis personnalisés','Bannière serveur animée'], price:13.99, period:'5 boosts · 1 mois', available:false, popular:false }
};

let products = [];
let cart = [];

// Écoute Firebase en temps réel
onValue(productsRef, (snapshot) => {
  if (snapshot.exists()) {
    // Convertir l'objet en tableau
    const data = snapshot.val();
    products = Object.values(data);
  } else {
    // Première fois : initialise Firebase avec les données par défaut
    set(productsRef, defaultProducts);
    products = Object.values(defaultProducts);
  }
  renderProducts();
  if (document.getElementById('dashboard') && document.getElementById('dashboard').classList.contains('show')) renderDashboard();
});

// ========================
// RENDER PRODUCTS
// ========================
const categories = [
  { id:'nitro',   tag:'// DISCORD NITRO',    title:'Abonnements Nitro',  ids:['nitro','basic','nitro3','nitro12'] },
  { id:'boosts',  tag:'// SERVER BOOSTS',    title:'Boosts de serveur',  ids:['boost1','boost5','boost14'] },
  { id:'autres',  tag:'// AUTRES',           title:'Autres produits',    ids:['spotify'] },
];

function makeCard(p) {
  const priceColor = p.color==='gold'?'var(--gold)':p.color==='spotify'?'var(--spotify)':p.color==='pink'?'var(--pink)':'var(--text)';
  const btnClass = p.color==='gold'?'btn-gold':p.color==='spotify'?'btn-spotify':p.color==='pink'?'btn-outline':'btn-blurple';
  const div = document.createElement('div');
  div.className = `card ${p.color} animate-in${!p.available?' unavailable':''}`;
  div.innerHTML = `
    ${p.popular?'<div class="popular-pill">⭐ Populaire</div>':''}
    ${!p.available?'<div class="unavailable-overlay"><span class="unavailable-tag">⏳ Indisponible</span></div>':''}
    <div class="card-badge ${p.badgeClass}">${p.badgeLabel}</div>
    <div class="card-icon">${p.icon}</div>
    <div class="card-title">${p.name}</div>
    <div class="card-desc">${p.desc}</div>
    <ul class="card-features">${p.features.map(f=>`<li>${f}</li>`).join('')}</ul>
    <div class="card-spacer"></div>
    <div class="card-price">
      <div class="price-amount" style="color:${priceColor}">${p.price.toFixed(2)} €</div>
      <div class="price-period">${p.period}</div>
    </div>
    <button class="btn btn-card ${btnClass}" onclick="addToCart('${p.id}')" ${!p.available?'disabled':''}>
      ${p.available?'Ajouter au panier':'Indisponible'}
    </button>`;
  return div;
}

function renderProducts() {
  const root = document.getElementById('products-root');
  if (!root) return;
  root.innerHTML = '';
  categories.forEach(cat => {
    const catProducts = cat.ids.map(id => products.find(p => p && p.id===id)).filter(Boolean);
    if (catProducts.length === 0) return;
    const section = document.createElement('section');
    section.className = 'section';
    if (cat.id === 'nitro') section.id = 'produits';
    section.innerHTML = `
      <div class="section-header animate-in">
        <div class="section-tag">${cat.tag}</div>
        <div class="section-title">${cat.title}</div>
      </div>
      <div class="grid" id="grid-${cat.id}"></div>`;
    root.appendChild(section);
    const grid = section.querySelector(`#grid-${cat.id}`);
    catProducts.forEach(p => grid.appendChild(makeCard(p)));
  });
  document.querySelectorAll('.animate-in:not(.visible)').forEach(el => observer.observe(el));
}

// ========================
// CART
// ========================
function addToCart(id) {
  const p = products.find(x => x && x.id === id);
  if (!p || !p.available) return;
  cart.push({ id: p.id, name: p.name, price: p.price });
  updateCartBadge();
  showToast(`${p.name} ajouté ! 🛒`);
}

function updateCartBadge() {
  const el = document.getElementById('cart-count');
  if (el) {
    el.textContent = cart.length;
    el.classList.toggle('visible', cart.length > 0);
  }
}

function openModal() {
  if (cart.length === 0) { showToast('Ton panier est vide !'); return; }
  renderModalItems();
  document.getElementById('modal-overlay').classList.add('show');
}

function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); }

function renderModalItems() {
  const el = document.getElementById('modal-items');
  if (!el) return;
  el.innerHTML = '';
  let total = 0;
  cart.forEach((item, i) => {
    total += item.price;
    el.innerHTML += `
      <div class="modal-item">
        <div class="modal-item-left">
          <div class="modal-item-name">${item.name}</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <div class="modal-item-price">${item.price.toFixed(2)} €</div>
          <button class="modal-remove" onclick="removeFromCart(${i})" title="Retirer">✕</button>
        </div>
      </div>`;
  });
  const totalEl = document.getElementById('modal-total');
  if (totalEl) totalEl.textContent = `${total.toFixed(2)} €`;
}

function removeFromCart(i) {
  cart.splice(i, 1);
  updateCartBadge();
  if (cart.length === 0) { closeModal(); return; }
  renderModalItems();
}

function checkout() {
  const discord = document.getElementById('discord-user').value.trim();
  if (!discord) { 
    const userInput = document.getElementById('discord-user');
    if (userInput) userInput.style.borderColor='#ED4245'; 
    return; 
  }
  const total = cart.reduce((s,i) => s + i.price, 0).toFixed(2);
  closeModal();
  const confirmAmount = document.getElementById('confirm-amount');
  if (confirmAmount) confirmAmount.textContent = `${total} €`;
  document.getElementById('confirm-overlay').classList.add('show');
  cart = [];
  updateCartBadge();
  window.open('https://paypal.me/ThomasHkV/' + total + 'EUR', '_blank');
}

function closeConfirm() { document.getElementById('confirm-overlay').classList.remove('show'); }

// click outside modals
['modal-overlay', 'confirm-overlay'].forEach(id => {
  const el = document.getElementById(id);
  if (el) {
    el.addEventListener('click', function(e) { if(e.target===this) this.classList.remove('show'); });
  }
});

// ========================
// TOAST
// ========================
function showToast(msg) {
  const t = document.getElementById('toast');
  if (!t) return;
  document.getElementById('toast-msg').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 3000);
}

// ========================
// FAQ
// ========================
function toggleFaq(btn) {
  const item = btn.parentElement;
  const open = item.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
  if (!open) item.classList.add('open');
}

// ========================
// SCROLL ANIMATIONS
// ========================
const observer = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.08, rootMargin: '0px 0px -30px 0px' });

// ========================
// DASHBOARD
// ========================
function openLogin() {
  document.getElementById('login-overlay').classList.add('show');
  setTimeout(() => {
    const pwdInput = document.getElementById('login-pwd');
    if (pwdInput) pwdInput.focus();
  }, 100);
}
function closeLogin() {
  document.getElementById('login-overlay').classList.remove('show');
  const pwdInput = document.getElementById('login-pwd');
  if (pwdInput) pwdInput.value = '';
  const errorEl = document.getElementById('login-error');
  if (errorEl) errorEl.style.display = 'none';
}
function checkLogin() {
  const pwd = document.getElementById('login-pwd').value;
  if (pwd === '7232') { closeLogin(); openDashboard(); }
  else { 
    const errorEl = document.getElementById('login-error');
    if (errorEl) errorEl.style.display = 'block';
    const pwdInput = document.getElementById('login-pwd');
    if (pwdInput) pwdInput.value = '';
  }
}

function openDashboard() {
  renderDashboard();
  document.getElementById('dashboard').classList.add('show');
}
function closeDashboard() { document.getElementById('dashboard').classList.remove('show'); }

function getCategoryForProduct(p) {
  if (p.id === 'spotify' || p.color === 'spotify') return 'spotify';
  if (p.id.includes('boost')) return 'boost';
  if (p.id.includes('nitro') || p.id.includes('basic')) return 'nitro';
  return 'autre';
}

function renderDashboard() {
  ['nitro','boost','spotify','autre'].forEach(cat => {
    const container = document.getElementById(`dash-${cat}`);
    if (container) container.innerHTML = '';
  });
  products.forEach((p, index) => {
    const cat = getCategoryForProduct(p);
    const container = document.getElementById(`dash-${cat}`) || document.getElementById('dash-autre');
    if (!container) return;
    const card = document.createElement('div');
    card.className = 'dash-card';
    card.innerHTML = `
      <div class="dash-card-title">${p.icon || '📦'} ${p.name}</div>
      <div class="dash-field">
        <label class="dash-label">Nom du produit</label>
        <input class="dash-input" id="d-name-${index}" value="${(p.name || '').replace(/"/g, '&quot;')}" />
      </div>
      <div class="dash-field">
        <label class="dash-label">Description</label>
        <input class="dash-input" id="d-desc-${index}" value="${(p.desc || '').replace(/"/g, '&quot;')}" />
      </div>
      <div class="dash-field">
        <label class="dash-label">Prix (€)</label>
        <input class="dash-input" id="d-price-${index}" type="number" step="0.01" value="${p.price || 0}" />
      </div>
      <div class="dash-field">
        <label class="dash-label">Période / sous-titre</label>
        <input class="dash-input" id="d-period-${index}" value="${(p.period || '').replace(/"/g, '&quot;')}" />
      </div>
      <div class="dash-field">
        <div class="dash-toggle">
          <label class="toggle">
            <input type="checkbox" id="d-avail-${index}" ${p.available ? 'checked' : ''} />
            <span class="toggle-slider"></span>
          </label>
          <span style="font-size:0.83rem;color:var(--muted)">Disponible à la vente</span>
        </div>
      </div>
      <button class="dash-save-btn" onclick="saveProduct(${index})">💾 Sauvegarder</button>
      <button class="dash-delete-btn" onclick="deleteProduct('${p.id}')">🗑 Supprimer ce produit</button>`;
    container.appendChild(card);
  });
}

function switchTab(tabName) {
  document.querySelectorAll('.dash-tab').forEach(t => t.classList.remove('active'));
  const clickedBtn = event ? event.target : null;
  if (clickedBtn) clickedBtn.classList.add('active');
  document.querySelectorAll('.dash-section').forEach(s => s.classList.remove('active'));
  const targetSection = document.getElementById(`tab-${tabName}`);
  if (targetSection) targetSection.classList.add('active');
}

async function createProduct() {
  const name = document.getElementById('new-name').value.trim();
  const icon = document.getElementById('new-icon').value.trim() || '📦';
  const desc = document.getElementById('new-desc').value.trim();
  const price = parseFloat(document.getElementById('new-price').value) || 0;
  const period = document.getElementById('new-period').value.trim();
  const color = document.getElementById('new-color').value;
  const category = document.getElementById('new-category').value;
  const available = document.getElementById('new-avail').checked;
  const featuresRaw = document.getElementById('new-features').value.trim();
  const features = featuresRaw ? featuresRaw.split('\n').map(f => f.trim()).filter(f => f) : [];

  if (!name) { showToast('⚠️ Donne un nom au produit !'); return; }

  const colorMap = { blurple: 'badge-blurple', pink: 'badge-pink', spotify: 'badge-spotify', gold: 'badge-gold' };
  const badgeLabelMap = { nitro: 'Nitro', boost: 'Boost', spotify: 'Spotify', autre: 'Nouveau' };
  
  const newProduct = {
    id: 'custom_' + Date.now(),
    icon, 
    name, 
    desc: desc || "Nouveau produit",
    color,
    badgeClass: colorMap[color] || 'badge-blurple',
    badgeLabel: badgeLabelMap[category] || 'Nouveau',
    features: features.length ? features : ['Fonctionnalité 1', 'Fonctionnalité 2'],
    price, 
    period: period || "1 mois", 
    available, 
    popular: false,
    category
  };

  try {
    // Ajouter le nouveau produit à Firebase
    const newProductRef = ref(db, `products/${newProduct.id}`);
    await set(newProductRef, newProduct);
    
    // Réinitialiser le formulaire
    const formIds = ['new-name','new-icon','new-desc','new-price','new-period','new-features'];
    formIds.forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = '';
    });
    const availCheckbox = document.getElementById('new-avail');
    if (availCheckbox) availCheckbox.checked = true;
    
    showToast(`✅ ${icon} ${name} créé avec succès !`);
  } catch (error) {
    console.error("Erreur lors de la création:", error);
    showToast(`❌ Erreur: ${error.message}`);
  }
}

async function deleteProduct(productId) {
  const product = products.find(p => p.id === productId);
  if (!product) return;
  if (!confirm(`Supprimer "${product.name}" définitivement ?`)) return;
  
  try {
    const productRef = ref(db, `products/${productId}`);
    await remove(productRef);
    showToast(`🗑 ${product.name} supprimé.`);
  } catch (error) {
    console.error("Erreur lors de la suppression:", error);
    showToast(`❌ Erreur: ${error.message}`);
  }
}

async function saveProduct(index) {
  const product = products[index];
  if (!product) return;
  
  const newName = document.getElementById(`d-name-${index}`).value;
  const newDesc = document.getElementById(`d-desc-${index}`).value;
  const newPrice = parseFloat(document.getElementById(`d-price-${index}`).value) || product.price;
  const newPeriod = document.getElementById(`d-period-${index}`).value;
  const newAvailable = document.getElementById(`d-avail-${index}`).checked;
  
  const updates = {};
  updates[`products/${product.id}/name`] = newName;
  updates[`products/${product.id}/desc`] = newDesc;
  updates[`products/${product.id}/price`] = newPrice;
  updates[`products/${product.id}/period`] = newPeriod;
  updates[`products/${product.id}/available`] = newAvailable;
  
  try {
    await update(ref(db), updates);
    showToast(`✅ ${newName} mis à jour !`);
  } catch (error) {
    console.error("Erreur lors de la mise à jour:", error);
    showToast(`❌ Erreur: ${error.message}`);
  }
}

// ========================
// INIT
// ========================
document.querySelectorAll('.animate-in').forEach(el => observer.observe(el));

// Exposition globale des fonctions
window.addToCart = addToCart;
window.removeFromCart = removeFromCart;
window.openModal = openModal;
window.closeModal = closeModal;
window.checkout = checkout;
window.closeConfirm = closeConfirm;
window.toggleFaq = toggleFaq;
window.openLogin = openLogin;
window.closeLogin = closeLogin;
window.checkLogin = checkLogin;
window.openDashboard = openDashboard;
window.closeDashboard = closeDashboard;
window.saveProduct = saveProduct;
window.deleteProduct = deleteProduct;
window.createProduct = createProduct;
window.switchTab = switchTab;
</script>
